<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Koneksi Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow border-0 p-4 bg-white rounded-4">
                <h2 class="fw-bold text-dark mb-4">Database Connection Test</h2>

                <div class="alert shadow-sm p-4 text-start" th:classappend="${alertClass}" role="alert">
                    <h4 class="alert-heading fw-bold">📢 Hasil Pengecekan:</h4>
                    <p class="mb-0 fs-5" th:text="${statusDB}">Menghubungkan ke database...</p>
                </div>

                <div class="mt-4">
                    <a href="/" class="btn btn-secondary px-4">⬅️ Kembali ke Beranda</a>
                    <a href="/cek-db" class="btn btn-primary px-4 ms-2">🔄 Cek Ulang Connection</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
