spring.application.name=sistem-donasi

# 1. Database Configuration (Dynamic variables populated by Docker Compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_donasi_banjir}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pbo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pbo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Database Migration & Safety (CRITICAL FOR PRODUCTION)
# Change 'update' to 'validate' in production to protect your live table data structures
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Connection Pooling Tuning (HikariCP Performance)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# 4. Reverse Proxy Header Awareness
# Tells Spring Boot to respect X-Forwarded-Proto headers sent by Nginx for secure links/redirects
server.forward-headers-strategy=native
# 5. Chatbot PeduliBot (Google Gemini API)
# 5. Chatbot PeduliBot (Groq API - gratis)
groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}